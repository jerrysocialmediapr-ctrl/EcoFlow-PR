name: Repair DELTA 2 Max dynamic cover

on:
  push:
    branches:
      - fix/delta2max-dynamic-cover

permissions:
  contents: write

jobs:
  patch-cover:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/delta2max-dynamic-cover
          persist-credentials: true

      - name: Patch dynamic PDF cover
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('api/crm-quote.js')
          text = path.read_text(encoding='utf-8')

          consultant_block = r'''
function drawConsultantCoverBlock(doc, options = {}) {
  const x = Number(options.x ?? 315);
  const y = Number(options.y ?? 735);
  const width = Number(options.width ?? 242);
  const lineWidth = Number(options.lineWidth ?? width);
  const contentX = x + 38;
  const textWidth = Math.max(120, width - 38);

  doc.save();
  drawCoverUserIcon(doc, x + 13, y + 19, 13);
  label(doc, 'Tu consultor:', contentX, y + 3, COLORS.teal, 8, textWidth);
  drawSingleLineCoverText(doc, BRAND.consultant, contentX, y + 23, textWidth, 'Helvetica-Bold', 13.5, 10, COLORS.white, 18);

  drawCoverPhoneIcon(doc, contentX, y + 49, 0.55);
  drawSingleLineCoverText(doc, BRAND.phone, contentX + 17, y + 45, textWidth - 17, 'Helvetica', 9.2, 7.5, '#D6E4E5', 16);

  drawCoverEmailIcon(doc, contentX, y + 69, 11, 7.5);
  drawSingleLineCoverText(doc, BRAND.email, contentX + 17, y + 64, textWidth - 17, 'Helvetica', 8.5, 6.5, '#D6E4E5', 17);

  doc.strokeColor(COLORS.teal).opacity(0.75).lineWidth(0.7).moveTo(x, y + 87).lineTo(x + lineWidth, y + 87).stroke();
  doc.opacity(1).restore();
}
'''

          if 'function drawConsultantCoverBlock' not in text:
              marker = '\nfunction drawHeader(doc, quoteId, pageNumber) {'
              if marker not in text:
                  raise SystemExit('Could not locate drawHeader insertion marker')
              text = text.replace(marker, '\n' + consultant_block + marker, 1)

          new_dynamic = r'''function drawDynamicCover(doc, customer, config, displayName, productImage) {
  doc.rect(0, 0, A4.width, A4.height).fill(COLORS.dark);
  doc.rect(0, 0, A4.width, 7).fill(COLORS.teal);
  doc.font('Helvetica').fontSize(26).fillColor(COLORS.teal).text('COTIZACIÓN', 38, 56, { characterSpacing: 1.2 });
  doc.font('Helvetica-Bold').fontSize(61).fillColor(COLORS.white).text('ECOFLOW', 36, 102, { characterSpacing: 2 });
  doc.font('Helvetica').fontSize(14).fillColor('#D6E4E5').text('ENERGÍA CONFIABLE PARA PUERTO RICO', 40, 183);

  doc.fillColor('#17262B').circle(420, 420, 165).fill();
  doc.fillColor('#1B3035').circle(430, 420, 115).fill();
  if (productImage) fitImage(doc, productImage, 275, 255, 275, 320);
  else drawProductPlaceholder(doc, config, 320, 335, 190, 165, true);

  const titleX = 38;
  const titleY = 603;
  const titleWidth = 510;
  const maxTitleHeight = 64;
  let titleSize = 27;
  let titleHeight = 0;
  do {
    doc.font('Helvetica-Bold').fontSize(titleSize);
    titleHeight = doc.heightOfString(displayName, { width: titleWidth, lineGap: 0 });
    if (titleHeight <= maxTitleHeight || titleSize <= 22) break;
    titleSize -= 1;
  } while (titleSize >= 22);

  doc.fillColor(COLORS.white).text(displayName, titleX, titleY, {
    width: titleWidth,
    height: maxTitleHeight,
    ellipsis: true,
    lineGap: 0,
  });

  const descriptionY = titleY + Math.min(titleHeight, maxTitleHeight) + 7;
  const descriptionBottom = 716;
  doc.font('Helvetica').fontSize(10.5).fillColor('#C5D3D5').text(String(config.description || ''), 40, descriptionY, {
    width: 500,
    height: Math.max(20, descriptionBottom - descriptionY),
    ellipsis: true,
    lineGap: 2,
  });

  doc.rect(0, 725, A4.width, 117).fill('#000000');
  doc.rect(0, 724, A4.width, 2).fill(COLORS.teal);
  drawCustomerCoverBlock(doc, customer, { x: 38, y: 735, width: 245, lineWidth: 245 });
  drawConsultantCoverBlock(doc, { x: 315, y: 735, width: 242, lineWidth: 242 });
}
'''

          start = text.find('function drawDynamicCover(doc, customer, config, displayName, productImage) {')
          if start < 0:
              raise SystemExit('Could not locate drawDynamicCover')
          end = text.find('\nfunction drawCover(doc, customer, config, displayName, productImage) {', start)
          if end < 0:
              raise SystemExit('Could not locate drawCover boundary')
          text = text[:start] + new_dynamic + text[end:]
          path.write_text(text, encoding='utf-8')

          workflow = Path('.github/workflows/fix-delta2max-dynamic-cover.yml')
          if workflow.exists():
              workflow.unlink()
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/crm-quote.js .github/workflows/fix-delta2max-dynamic-cover.yml
          git commit -m "fix: complete DELTA 2 Max dynamic cover [dynamic-cover-repaired]"
          git push origin HEAD:fix/delta2max-dynamic-cover
