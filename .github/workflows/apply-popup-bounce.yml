name: Apply popup bounce animation

on:
  push:
    branches:
      - agent/july-offers-popup

permissions:
  contents: write

jobs:
  apply-animation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout popup branch
        uses: actions/checkout@v4
        with:
          ref: agent/july-offers-popup
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply zoom and bounce animation
        run: node scripts/apply-popup-bounce.mjs

      - name: Run tests
        run: |
          npm install
          npm test

      - name: Validate animation
        shell: bash
        run: |
          set -euo pipefail
          grep -q "julyPopupBounce" public/index.html
          grep -q "background:rgba(1,10,14,.50)" public/index.html
          grep -q "backdrop-filter:blur(2px)" public/index.html
          grep -q "prefers-reduced-motion: reduce" public/index.html

      - name: Commit final animation
        shell: bash
        run: |
          rm -f scripts/apply-popup-bounce.mjs
          rm -f .github/workflows/apply-popup-bounce.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add soft zoom and single bounce to popup"
          git push origin agent/july-offers-popup
