name: Enlarge quote product PNGs

on:
  push:
    branches:
      - agent/fix-quote-product-images

permissions:
  contents: write

jobs:
  enlarge-products:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-quote-product-images
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies and image tools
        run: |
          npm install
          sudo apt-get update
          sudo apt-get install -y imagemagick poppler-utils

      - name: Apply PDF layout patch
        run: node scripts/enlarge-quote-products.mjs

      - name: Rebuild tightly cropped product PNGs
        shell: bash
        run: |
          crop_product() {
            src="$1"
            dest="$2"
            convert "$src" -alpha on -trim +repage -resize '1400x1400>' "$dest"
            identify "$dest"
          }

          crop_product "Delta 2 max/delta2-frente.png" "public/quote-assets/delta-2-max-product.png"
          crop_product "Delta Pro Ultra/DeltaProUltra.png" "public/quote-assets/delta-pro-ultra-product.png"
          crop_product "Delta Pro Ultra/deltaproultra+smhp2.png" "public/quote-assets/delta-pro-ultra-smhp2-product.png"

      - name: Run tests
        run: npm test

      - name: Regenerate PDF and PNG previews
        shell: bash
        run: |
          rm -rf public/quote-previews
          mkdir -p public/quote-previews
          node --input-type=module <<'NODE'
          import fs from 'fs';
          import { PRODUCTS_TABLE, generatePremiumQuotePdf } from './api/lead.js';

          const lead = {
            nombre: 'CLIENTE DE PRUEBA',
            telefono: '7876281344',
            email: 'cliente@ejemplo.com',
            pueblo: 'San Juan'
          };

          const previews = [
            ['delta-2-max', 'Batería para apartamento (Delta 2 Max)'],
            ['delta-pro-3', 'Batería para casa (Delta Pro 3)'],
            ['delta-pro-ultra', 'Sistema completo para hogar (Delta Pro Ultra)'],
            ['delta-pro-ultra-smhp2', 'Delta Pro Ultra + Smart Home Panel 2']
          ];

          for (const [slug, key] of previews) {
            const config = { key, ...PRODUCTS_TABLE[key] };
            const pdf = await generatePremiumQuotePdf(lead, { quoteId: `PREVIEW-${slug}` }, config);
            fs.writeFileSync(`public/quote-previews/${slug}.pdf`, pdf);
          }
          NODE

          for pdf in public/quote-previews/*.pdf; do
            base="${pdf%.pdf}"
            pdftoppm -png -r 115 "$pdf" "$base"
          done

      - name: Commit final corrections
        shell: bash
        run: |
          rm -f scripts/enlarge-quote-products.mjs
          rm -f .github/workflows/enlarge-quote-products.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: enlarge quote products on pages 2 and 3"
          git push origin agent/fix-quote-product-images
