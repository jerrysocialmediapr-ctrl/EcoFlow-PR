name: Apply CRM quote auth hotfix

on:
  push:
    branches:
      - hotfix/crm-quote-auth

permissions:
  contents: write

jobs:
  hotfix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: hotfix/crm-quote-auth
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply authentication fix
        run: node scripts/apply-crm-quote-auth-hotfix.mjs

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Commit finished hotfix
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/apply-crm-quote-auth-hotfix.mjs
          rm -f .github/workflows/apply-crm-quote-auth-hotfix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "fix: accept shared CRM and GAS quote tokens"
            git push origin hotfix/crm-quote-auth
          fi
