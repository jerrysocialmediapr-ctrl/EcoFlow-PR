name: Apply DELTA Pro 3 premium customer card

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-pdf-cover:
    if: github.event.pull_request.head.ref == 'fix/pro3-premium-customer-card'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/pro3-premium-customer-card
          persist-credentials: true

      - name: Apply premium customer card
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          lead_path = Path('api/lead.js')
          lead = lead_path.read_text(encoding='utf-8')
          patch_start = "import PDFDocument from 'pdfkit';\n"
          patch_end = "applyPro3CoverOffsetPatch();\n\n"
          if patch_start in lead and patch_end in lead:
              start = lead.index(patch_start)
              end = lead.index(patch_end, start) + len(patch_end)
              lead = lead[:start] + lead[end:]
              lead_path.write_text(lead, encoding='utf-8')

          crm_path = Path('api/crm-quote.js')
          crm = crm_path.read_text(encoding='utf-8')

          customer_start = crm.index('function drawCustomerCoverBlock(')
          consultant_start = crm.index('\n\n\nfunction drawConsultantCoverBlock', customer_start)
          new_customer = '''function drawCustomerCoverBlock(doc, customer, options = {}) {
            const card = Boolean(options.card);
            const cardX = Number(options.x ?? 48);
            const cardY = Number(options.y ?? 700);
            const cardWidth = Number(options.cardWidth ?? options.width ?? 230);
            const cardHeight = Number(options.cardHeight ?? 105);
            const padding = card ? Number(options.padding ?? 12) : 0;
            const x = cardX + padding;
            const y = cardY + (card ? 8 : 0);
            const width = card ? cardWidth - (padding * 2) : Number(options.width ?? 230);
            const showLine = options.showLine ?? !card;
            const lineWidth = Number(options.lineWidth ?? width);
            const contentX = x + 38;
            const textWidth = Math.max(120, width - 38);

            doc.save();
            if (card) {
              doc.save();
              doc.fillColor('#071012').opacity(0.88).roundedRect(cardX, cardY, cardWidth, cardHeight, 12).fill();
              doc.opacity(1).lineWidth(0.8).strokeColor(COLORS.teal).roundedRect(cardX, cardY, cardWidth, cardHeight, 12).stroke();
              doc.restore();
            }

            drawCoverUserIcon(doc, x + 13, y + 19, 13);
            label(doc, 'Cotización para:', contentX, y + 3, COLORS.teal, 8, textWidth);
            drawSingleLineCoverText(doc, customer.nombre, contentX, y + 23, textWidth, 'Helvetica-Bold', 13.5, 9.5, COLORS.white, 18);

            drawCoverPhoneIcon(doc, contentX, y + 49, 0.55);
            drawSingleLineCoverText(doc, formatPhone(customer.telefono), contentX + 17, y + 45, textWidth - 17, 'Helvetica', 9.2, 7.5, '#D6E4E5', 16);

            drawCoverEmailIcon(doc, contentX, y + 69, 11, 7.5);
            drawSingleLineCoverText(doc, customer.email, contentX + 17, y + 64, textWidth - 17, 'Helvetica', 8.5, 6.5, '#D6E4E5', 17);

            if (showLine) {
              doc.strokeColor(COLORS.teal).opacity(0.75).lineWidth(0.7).moveTo(x, y + 87).lineTo(x + lineWidth, y + 87).stroke();
              doc.opacity(1);
            }
            doc.restore();
          }'''
          crm = crm[:customer_start] + new_customer + crm[consultant_start:]

          cover_start = crm.index('function drawCover(')
          items_start = crm.index('\n\nfunction drawItemsTable', cover_start)
          new_cover = '''function drawCover(doc, customer, config, displayName, productImage) {
            const cover = resolveAsset(config.coverAsset);
            if (!cover) return drawDynamicCover(doc, customer, config, displayName, productImage);

            doc.image(cover, 0, 0, { width: A4.width, height: A4.height });

            if (config.coverAsset === 'delta-pro-3-cover-jerry.jpg') {
              drawCustomerCoverBlock(doc, customer, {
                x: 346,
                y: 620,
                card: true,
                cardWidth: 210,
                cardHeight: 105,
                padding: 12,
                showLine: false,
              });
              return;
            }

            // Las demás portadas aprobadas mantienen su ubicación original.
            drawCustomerCoverBlock(doc, customer, { x: 48, y: 700, width: 232, lineWidth: 226 });
          }'''
          crm = crm[:cover_start] + new_cover + crm[items_start:]
          crm_path.write_text(crm, encoding='utf-8')

          for temporary in [
              Path('.github/workflows/apply-pro3-premium-card.yml'),
              Path('.github/pro3-card-trigger.txt'),
          ]:
              if temporary.exists():
                  temporary.unlink()
          PY

      - name: Run tests
        run: npm test

      - name: Commit premium card
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: add premium customer card to DELTA Pro 3 cover [pro3-card-applied]"
          git push origin HEAD:fix/pro3-premium-customer-card
