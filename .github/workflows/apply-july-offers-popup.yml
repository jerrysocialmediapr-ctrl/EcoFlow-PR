name: Apply July offers popup

on:
  push:
    branches:
      - agent/july-offers-popup

permissions:
  contents: write

jobs:
  build-popup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/july-offers-popup
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate uploaded promotional images
        shell: bash
        run: |
          set -euo pipefail
          test -s public/ofertas-julio-2026/Kit-pro-3.jpeg.JPG
          test -s public/ofertas-julio-2026/Kit-pro.jpeg.JPG
          test -s public/ofertas-julio-2026/Kit-pro-ultra.jpeg.JPG
          test -s public/ofertas-julio-2026/cisterna-gratis.jpeg.png

      - name: Add popup carousel to website
        run: node scripts/apply-july-popup.mjs

      - name: Install dependencies and run tests
        run: |
          npm install
          npm test

      - name: Validate popup output
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'id="july-offers-popup"' public/index.html
          grep -q '/ofertas-julio-2026/Kit-pro-3.jpeg.JPG' public/index.html
          grep -q '/ofertas-julio-2026/Kit-pro.jpeg.JPG' public/index.html
          grep -q '/ofertas-julio-2026/Kit-pro-ultra.jpeg.JPG' public/index.html
          grep -q '/ofertas-julio-2026/cisterna-gratis.jpeg.png' public/index.html
          grep -q 'tel:7876281344' public/index.html
          grep -q "2026-08-01T00:00:00-04:00" public/index.html

      - name: Commit finished popup
        shell: bash
        run: |
          rm -f scripts/apply-july-popup.mjs
          rm -f .github/workflows/apply-july-offers-popup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add expiring July offers popup carousel"
          git push origin agent/july-offers-popup
