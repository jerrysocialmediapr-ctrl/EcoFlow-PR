name: Apply July offers popup

on:
  push:
    branches:
      - agent/july-offers-popup

permissions:
  contents: write

jobs:
  build-popup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/july-offers-popup
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Decode promotional images
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public/offers/july-2026
          tr -d '[:space:]' < tmp-assets/optimized-kit-pro3.webp.b64 | base64 -d > public/offers/july-2026/huracan-kit-pro-3.webp
          tr -d '[:space:]' < tmp-assets/optimized-kit-pro.webp.b64 | base64 -d > public/offers/july-2026/huracan-kit-pro.webp
          cat tmp-assets/mini-kit-pro-ultra.webp.b64.part1 tmp-assets/mini-kit-pro-ultra.webp.b64.part2 | tr -d '[:space:]' | base64 -d > public/offers/july-2026/huracan-kit-pro-ultra.webp
          cat tmp-assets/mini-cisterna-gratis.webp.b64.part1 tmp-assets/mini-cisterna-gratis.webp.b64.part2 | tr -d '[:space:]' | base64 -d > public/offers/july-2026/cisterna-gratis.webp

      - name: Add popup carousel to website
        run: node scripts/apply-july-popup.mjs

      - name: Install dependencies and run tests
        run: |
          npm install
          npm test

      - name: Validate popup output
        shell: bash
        run: |
          set -euo pipefail
          test -s public/offers/july-2026/huracan-kit-pro-3.webp
          test -s public/offers/july-2026/huracan-kit-pro.webp
          test -s public/offers/july-2026/huracan-kit-pro-ultra.webp
          test -s public/offers/july-2026/cisterna-gratis.webp
          grep -q 'id="july-offers-popup"' public/index.html
          grep -q "2026-08-01T00:00:00-04:00" public/index.html

      - name: Commit finished popup
        shell: bash
        run: |
          rm -rf tmp-assets
          rm -f scripts/apply-july-popup.mjs
          rm -f .github/workflows/apply-july-offers-popup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add expiring July offers popup carousel"
          git push origin agent/july-offers-popup
