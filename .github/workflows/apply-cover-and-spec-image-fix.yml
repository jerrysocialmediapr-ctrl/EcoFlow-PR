name: Apply cover and page 3 image fix

on:
  push:
    branches:
      - agent/fix-quote-product-images

permissions:
  contents: write

jobs:
  correct-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-quote-product-images
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies and image tools
        run: |
          npm install
          sudo apt-get update
          sudo apt-get install -y imagemagick poppler-utils

      - name: Restore approved DELTA Pro Ultra cover
        run: |
          git checkout origin/main -- public/quote-assets/delta-pro-ultra-cover-jerry.png
          rm -f public/quote-assets/delta-pro-ultra-cover-jerry.jpg

      - name: Apply generator corrections
        run: node scripts/apply-cover-and-spec-image-fix.mjs

      - name: Normalize transparent product PNGs
        shell: bash
        run: |
          normalize_product() {
            src="$1"
            dest="$2"
            convert "$src" -alpha on -trim +repage -resize '940x940>' -gravity center -background none -extent 1000x1000 "$dest"
            identify "$dest"
          }

          normalize_product "Delta 2 max/delta2-frente.png" "public/quote-assets/delta-2-max-product.png"
          normalize_product "Delta Pro Ultra/DeltaProUltra.png" "public/quote-assets/delta-pro-ultra-product.png"
          normalize_product "Delta Pro Ultra/deltaproultra+smhp2.png" "public/quote-assets/delta-pro-ultra-smhp2-product.png"

      - name: Run test suite
        run: npm test

      - name: Regenerate PDF and PNG previews
        shell: bash
        run: |
          rm -rf public/quote-previews
          mkdir -p public/quote-previews
          node --input-type=module <<'NODE'
          import fs from 'fs';
          import { PRODUCTS_TABLE, generatePremiumQuotePdf } from './api/lead.js';

          const lead = {
            nombre: 'CLIENTE DE PRUEBA',
            telefono: '7876281344',
            email: 'cliente@ejemplo.com',
            pueblo: 'San Juan'
          };

          const previews = [
            ['delta-2-max', 'Batería para apartamento (Delta 2 Max)'],
            ['delta-pro-3', 'Batería para casa (Delta Pro 3)'],
            ['delta-pro-ultra', 'Sistema completo para hogar (Delta Pro Ultra)'],
            ['delta-pro-ultra-smhp2', 'Delta Pro Ultra + Smart Home Panel 2']
          ];

          for (const [slug, key] of previews) {
            const config = { key, ...PRODUCTS_TABLE[key] };
            const pdf = await generatePremiumQuotePdf(lead, { quoteId: `PREVIEW-${slug}` }, config);
            fs.writeFileSync(`public/quote-previews/${slug}.pdf`, pdf);
          }
          NODE

          for pdf in public/quote-previews/*.pdf; do
            base="${pdf%.pdf}"
            pdftoppm -png -r 115 "$pdf" "$base"
          done

      - name: Validate corrected assets
        run: |
          test -f public/quote-assets/delta-pro-ultra-cover-jerry.png
          test ! -f public/quote-assets/delta-pro-ultra-cover-jerry.jpg
          test -f public/quote-assets/delta-2-max-product.png
          test -f public/quote-assets/delta-pro-ultra-product.png
          test -f public/quote-assets/delta-pro-ultra-smhp2-product.png

      - name: Commit fixes to PR branch
        shell: bash
        run: |
          rm -f scripts/apply-cover-and-spec-image-fix.mjs
          rm -f .github/workflows/apply-cover-and-spec-image-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: restore Ultra cover and center page 3 products"
          git push origin agent/fix-quote-product-images
