name: Temporary Remove GAS Quote Fallback

on:
  push:
    branches:
      - security/crm-service-auth

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: security/crm-service-auth
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --silent
      - name: Remove GAS token fallback
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('api/crm-quote.js')
          text = path.read_text()
          old = "process.env.CRM_QUOTE_TOKEN || process.env.GAS_TOKEN || ''"
          new = "process.env.CRM_QUOTE_TOKEN || ''"
          if old not in text:
              raise SystemExit('Expected GAS token fallback was not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - run: npm test
      - name: Commit isolated quote token change
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/crm-quote.js
          git commit -m "security: require dedicated quote token"
          git push origin HEAD:security/crm-service-auth
