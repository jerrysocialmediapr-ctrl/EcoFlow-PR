name: Apply quote image fix

on:
  push:
    branches:
      - agent/fix-quote-product-images
    paths:
      - scripts/apply-quote-image-fix.mjs
      - .github/workflows/apply-quote-image-fix.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-quote-product-images
          fetch-depth: 0

      - name: Apply targeted PDF image corrections
        run: node scripts/apply-quote-image-fix.mjs

      - name: Commit corrected generator
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/lead.js
          if git diff --cached --quiet; then
            echo "No changes required"
            exit 0
          fi
          git commit -m "fix: render correct battery images in quote PDFs [skip ci]"
          git push origin HEAD:agent/fix-quote-product-images
