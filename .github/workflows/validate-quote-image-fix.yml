name: Validate quote image fix

on:
  push:
    branches:
      - agent/fix-quote-product-images
    paths:
      - .github/workflows/validate-quote-image-fix.yml

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-quote-product-images
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Record successful validation
        run: |
          printf 'Tests passed for quote image fix.\n' > .quote-image-tests-passed
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .quote-image-tests-passed
          git commit -m "test: validate quote image fix [skip ci]"
          git push origin HEAD:agent/fix-quote-product-images
